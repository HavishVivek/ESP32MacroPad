sentence=A flexible macro-pad library for ESP32 with BLE keyboard, rotary encoders, OLED display, and multi-layout button mapping.
paragraph=Build custom BLE macro pads on ESP32 with ease. Supports up to 16 buttons, 4 rotary encoders (with push buttons), an SSD1306 OLED for action feedback, and up to 8 switchable layouts — all wired together with a simple callback API. Built on top of ESP32-BLE-Keyboard and Adafruit SSD1306.
